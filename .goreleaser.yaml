project_name: ccgen

before:
  hooks:
    - go mod tidy

builds:
  - id: ccgen
    main: ./main.go
    binary: ccgen
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    builds:
      - ccgen
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  filters:
    exclude:
      - '^docs(\(.*\))?:'
      - '^test(\(.*\))?:'

  sort: asc

release:
  github:
    owner: b14ucky
    name: ccgen
